name: Deploy spec to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "spec/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs but let
# the latest finish so the live site reflects HEAD.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8"

      - name: Sync spec/ deps
        working-directory: spec
        run: uv sync --frozen || uv sync

      - name: Build spec (warnings as errors)
        working-directory: spec
        run: uv run sphinx-build -W -b html . _build/html

      - name: Set up Node for mermaid validator
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: spec/scripts/package-lock.json

      - name: Install mermaid validator deps
        working-directory: spec/scripts
        run: npm ci --silent

      - name: Validate mermaid diagrams (gate before deploy)
        working-directory: spec
        run: node scripts/validate-mermaid.mjs .

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: spec/_build/html

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
