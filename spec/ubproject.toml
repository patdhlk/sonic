# sphinx-needs configuration consumed via `needs_from_toml = "ubproject.toml"`
# in conf.py. Holds need-type and link-type declarations only — Sphinx-level
# configuration (extensions, theme, etc.) lives in conf.py.

[project]
name = "sonic-spec"

[needs]
id_required = true
id_length = 6

# Need types — directives available in RST. Extend as the spec grows.
[[needs.types]]
directive = "feat"
title = "Feature"
prefix = "FEAT_"
color = "#BFD8D2"
style = "node"

[[needs.types]]
directive = "req"
title = "Requirement"
prefix = "REQ_"
color = "#BFD8D2"
style = "node"

[[needs.types]]
directive = "spec"
title = "Specification"
prefix = "SPEC_"
color = "#FEDCD2"
style = "node"

[[needs.types]]
directive = "impl"
title = "Implementation"
prefix = "IMPL_"
color = "#DF744A"
style = "node"

[[needs.types]]
directive = "test"
title = "Test Case"
prefix = "TEST_"
color = "#DCB239"
style = "node"

# arc42 architecture types — used in spec/architecture/ pages following the
# useblocks "x-as-code" arc42 conventions
# (https://x-as-code.useblocks.com/how-to-guides/arc42/index.html).

[[needs.types]]
directive = "quality-goal"
title = "Quality Goal"
prefix = "QG_"
color = "#A4D4AE"
style = "node"

[[needs.types]]
directive = "constraint"
title = "Constraint"
prefix = "CON_"
color = "#E8C8A0"
style = "node"

[[needs.types]]
directive = "arch-decision"
title = "Architecture Decision"
prefix = "ADR_"
color = "#A6C8E0"
style = "node"

[[needs.types]]
directive = "building-block"
title = "Building Block"
prefix = "BB_"
color = "#C0A6E0"
style = "node"

[[needs.types]]
directive = "architecture"
title = "Architecture View"
prefix = "ARCH_"
color = "#BFD8D2"
style = "node"

[[needs.types]]
directive = "risk"
title = "Risk"
prefix = "RISK_"
color = "#E0A6A6"
style = "node"

[[needs.types]]
directive = "term"
title = "Glossary Term"
prefix = "GLOSS_"
color = "#D8D8D8"
style = "node"

# Extra link types — additional traceability relations beyond the built-in
# `:links:` option. Keyed by option name; each entry sets the outgoing and
# incoming display text. (sphinx-needs 8.0 renamed extra_links → links and
# changed the shape from list-of-dicts to a dict-of-dicts.)

[needs.links.satisfies]
incoming = "is satisfied by"
outgoing = "satisfies"

[needs.links.refines]
incoming = "is refined by"
outgoing = "refines"

[needs.links.implements]
incoming = "is implemented by"
outgoing = "implements"

[needs.links.verifies]
incoming = "is verified by"
outgoing = "verifies"
