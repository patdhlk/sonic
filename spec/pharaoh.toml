# Pharaoh configuration for the sonic-spec sphinx-needs project.
#
# Generated by pharaoh-setup. Sphinx-level configuration (need types, link
# types, ID requirements) is read from ubproject.toml — do not duplicate
# those here.

[pharaoh]
strictness = "advisory"

[pharaoh.id_scheme]
# Inferred from 3 sampled IDs in spec/**/*.rst.
# Observed shape: {TYPE}_{NUMBER} (e.g. FEAT_0001).
pattern = "{TYPE}_{NUMBER}"
auto_increment = true

[pharaoh.workflow]
mode = "reverse-eng"
# Gates tuned for reverse-eng — types and content exist but the catalogue
# isn't yet matured. Tighten as needs accumulate review/approval status.
require_change_analysis = false
require_verification = true
require_mece_on_release = false

[pharaoh.traceability]
# No needs.json built yet; direction inference declined to guess link
# directions from option names alone. Re-run `pharaoh:setup` after the
# first sphinx-build under typical authoring or add chains manually in
# the form "source-type -> target-type".
required_links = [
    # TODO: chains will be inferred from needs.json once the spec contains
    # a non-trivial population of needs with their link options populated.
]

[pharaoh.codelinks]
enabled = false
