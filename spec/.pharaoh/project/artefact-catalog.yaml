# artefact-catalog.yaml — sonic-spec per-type policy.
#
# Source of truth alignment:
#   - directive→prefix mapping  : spec/ubproject.toml [[needs.types]]
#   - status enum               : spec/schemas.json status-enum rule
#   - link directive names      : spec/ubproject.toml [needs.links.*]
#
# Lifecycle states below are the canonical 8-state enum from schemas.json
# (see spec/.pharaoh/project/workflows.yaml for the transition graph).
#
# Required vs optional links: encoded so pharaoh-link-completeness-check
# can flag dangling parents. Where a type has *no* required parent
# (umbrella feats, HARA roots, glossary terms, assumptions), required_links
# stays empty and the convention is documented in a comment.

# ---------------------------------------------------------------- Core

feat:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, rejected, accepted]
  # Umbrella feats (FEAT_0010, FEAT_0030, FEAT_0040, FEAT_0050, FEAT_0060)
  # have no parent and so cannot require :satisfies:. Cluster sub-feats DO
  # satisfy their umbrella but the catalog cannot distinguish the two by
  # type alone, so :satisfies: stays optional and the umbrella/cluster
  # discipline is enforced by review of the page narrative.
  required_links: []
  optional_links: [satisfies, refines, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

req:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, rejected]
  required_links: [satisfies]
  optional_links: [refines, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

spec:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, rejected]
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

impl:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, rejected]
  required_links: [implements]
  optional_links: [satisfies, refines, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

test:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, rejected]
  required_links: [verifies]
  optional_links: [satisfies, refines, implements, links]
  required_metadata_fields: [status]
  required_roles: []

# ------------------------------------------------------ arc42 architecture

quality-goal:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, accepted, rejected]
  # quality-goal refines a feat (or umbrella feat) — captures the property
  # the architecture optimises for.
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

constraint:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, accepted, rejected]
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

arch-decision:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  # ADR-specific: 'accepted' is the natural terminal state for a recorded
  # decision whose context has settled; 'open' is also common for ADRs
  # still under deliberation.
  lifecycle: [open, draft, review, approved, accepted, rejected]
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

building-block:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, implemented, accepted, rejected]
  required_links: [implements]
  optional_links: [satisfies, refines, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

architecture:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, accepted, rejected]
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

risk:
  required_fields: [id, status, title]
  optional_fields: [reviewer, approved_by, source_doc]
  lifecycle: [open, draft, review, approved, accepted, rejected]
  # Risks document residual concerns; they typically point at the feat or
  # ADR they qualify via the generic :links: relation rather than a typed
  # link, so no link is required.
  required_links: []
  optional_links: [refines, links]
  required_metadata_fields: [status]
  required_roles: []

term:
  required_fields: [id, status, title]
  optional_fields: [source_doc]
  # Glossary terms are definitional leaves; no review chain needed.
  lifecycle: [open, accepted]
  required_links: []
  optional_links: [links]
  required_metadata_fields: [status]
  required_roles: []

# ----------------------------------------------- ISO 26262 SEooC safety

# 'assumed-*' types carry safety inputs that come from the integrator's
# real HARA — sonic does not own them and does not advance them through
# the normal lifecycle. The canonical status is 'assumed'.

assumed-hazard:
  required_fields: [id, status, title]
  optional_fields: [asil, reviewer, approved_by, source_doc]
  # HARA root within the SEooC envelope — no parent link required.
  lifecycle: [open, assumed, rejected]
  required_links: []
  optional_links: [links]
  required_metadata_fields: [status]
  required_roles: []

assumed-safety-goal:
  required_fields: [id, status, title]
  optional_fields: [asil, reviewer, approved_by, source_doc]
  lifecycle: [open, assumed, rejected]
  required_links: [refines]
  optional_links: [links]
  required_metadata_fields: [status]
  required_roles: []

assumed-fsr:
  required_fields: [id, status, title]
  optional_fields: [asil, reviewer, approved_by, source_doc]
  lifecycle: [open, assumed, rejected]
  required_links: [refines]
  optional_links: [links]
  required_metadata_fields: [status]
  required_roles: []

tsr:
  required_fields: [id, status, title]
  optional_fields: [asil, reviewer, approved_by, source_doc]
  # Technical Safety Requirement — sonic owns it, full lifecycle applies.
  lifecycle: [open, draft, review, approved, implemented, rejected]
  required_links: [refines]
  optional_links: [satisfies, implements, verifies, links]
  required_metadata_fields: [status]
  required_roles: []

aou:
  required_fields: [id, status, title]
  optional_fields: [asil, reviewer, approved_by, source_doc]
  # Assumption of Use — declares an integrator contract. Leaf artefact;
  # no required parent (it points outward, to the integrator).
  lifecycle: [open, draft, review, approved, accepted, rejected]
  required_links: []
  optional_links: [refines, links]
  required_metadata_fields: [status]
  required_roles: []
