# workflows.yaml — sonic-spec status lifecycle.
#
# Source of truth: spec/schemas.json `status-enum` rule. The eight states
# below are exactly the values that schemas.json's enum permits, so any
# need that passes schema validation can be classified by this workflow.
#
# The original auto-generated file listed four states inferred from a
# 3-need sample early in the spec; the real spec has since grown to 700+
# needs and uses the full enum. This file is the catch-up.

lifecycle_states:
  - open          # initial draft, brainstorm output, not reviewed
  - draft         # taken into authoring, not yet reviewed
  - review        # under peer review (note: not "reviewed" — schemas.json
                  # canon is the present-tense "review" state)
  - approved      # peer review passed
  - implemented   # implementation has landed; trace closed via :implements:
  - rejected      # explicitly rejected (anti-goals, deprecated proposals)
  - assumed       # SEooC: assumed input from the integrator's HARA, not
                  # verified by sonic — used by assumed-hazard /
                  # assumed-safety-goal / assumed-fsr artefacts
  - accepted      # design decision recorded and accepted; typically used
                  # by arch-decision artefacts whose context is settled

# Permissive forward chain. Each transition lists no preconditions —
# advisory mode does not gate transitions. Tighten by adding requires:
# lists if a release pipeline ever needs it.
transitions:
  - {from: open,        to: draft,       requires: []}
  - {from: draft,       to: review,      requires: []}
  - {from: review,      to: approved,    requires: []}
  - {from: approved,    to: implemented, requires: []}
  - {from: open,        to: rejected,    requires: []}
  - {from: draft,       to: rejected,    requires: []}
  - {from: review,      to: rejected,    requires: []}
  # Re-work loops
  - {from: review,      to: draft,       requires: []}
  - {from: approved,    to: draft,       requires: []}
  # SEooC: assumed work products stay in the assumed state — they are
  # integrator inputs that sonic does not advance through the lifecycle.
  - {from: open,        to: assumed,     requires: []}
  # arch-decision: open → accepted captures the "decision recorded and
  # context is settled" transition without forcing the full review chain.
  - {from: open,        to: accepted,    requires: []}
  - {from: draft,       to: accepted,    requires: []}
