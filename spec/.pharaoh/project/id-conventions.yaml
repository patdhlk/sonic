# id-conventions.yaml — generated by pharaoh-setup
#
# Inferred from observed IDs in spec/**/*.rst (3 samples).
# Observed shape: {TYPE}_{NUMBER}, all conforming.

prefixes:
  feat: FEAT_
  req: REQ_
  spec: SPEC_
  impl: IMPL_
  test: TEST_

# Union of declared prefixes followed by 1+ digits.
id_regex: "^(FEAT_|REQ_|SPEC_|IMPL_|TEST_)[0-9]+$"

separator: "_"
