# id-conventions.yaml — sonic-spec ID prefix policy.
#
# Source of truth: spec/ubproject.toml `[[needs.types]]` declarations. The
# prefix table below is the full set of 17 directive→prefix mappings the
# sphinx-needs configuration registers, sorted into three groups:
#
#   - Core sphinx-needs types (feat, req, spec, impl, test)
#   - arc42 architecture types (used in spec/architecture/)
#   - ISO 26262 SEooC safety types (used in spec/safety/)
#
# Schema-side authority for the ID *shape* (4-digit zero-padded suffix)
# lives in spec/schemas.json; this file is pharaoh's view of the same.

prefixes:
  # Core
  feat: FEAT_
  req:  REQ_
  spec: SPEC_
  impl: IMPL_
  test: TEST_

  # arc42 architecture
  quality-goal:   QG_
  constraint:     CON_
  arch-decision:  ADR_
  building-block: BB_
  architecture:   ARCH_
  risk:           RISK_
  term:           GLOSS_

  # ISO 26262 SEooC safety
  assumed-hazard:      AHZ_
  assumed-safety-goal: ASG_
  assumed-fsr:         AFSR_
  tsr:                 TSR_
  aou:                 AOU_

# Union of declared prefixes followed by 1+ digits. Matches schemas.json
# per-type pattern `^<PREFIX>\d{4}$` for every declared type. The
# alternation is written explicitly rather than dynamically generated so
# the regex stays human-reviewable; sphinx-needs enforces the per-type
# `\d{4}` shape separately via schemas.json.
id_regex: "^(AFSR_|AHZ_|ARCH_|ASG_|ADR_|AOU_|BB_|CON_|FEAT_|GLOSS_|IMPL_|QG_|REQ_|RISK_|SPEC_|TEST_|TSR_)[0-9]+$"

separator: "_"
